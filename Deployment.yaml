apiVersion: v1
kind: Deployment
metadta:
  name: my-app
  labels:
    app: my-app-demo
spec:
  replicas: 3
  selector:
    matchLaels:
      app: my-app-demo
  template:
    metadta:
      lables:
        app: my-app-demo
    spec:
      containers:
      - name: my-app-comtainer
        image: nginx:latest
        ports:
        - conatinerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: LoadBalancer   # Exposes service externally
  selector:
    app: my-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80



